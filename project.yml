name: Grippd
options:
  bundleIdPrefix: com.grippd
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    ENABLE_PREVIEWS: YES

targets:
  Grippd:
    type: application
    platform: iOS
    sources:
      - path: Grippd
    resources:
      - path: Grippd/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grippd.app
        INFOPLIST_FILE: Grippd/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []

  GrippedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GrippedTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Grippd.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Grippd"
    dependencies:
      - target: Grippd
